<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar tarefas</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            background: linear-gradient(to bottom right, #050816, #0f172a);

            min-height: 100vh;

            color: white;

            padding: 60px;
        }

        .top{
            margin-bottom: 60px;
        }

        .top h1{

            font-size: 4.5rem;

            color: #60a5fa;

            margin-bottom: 15px;
        }

        .top p{

            font-size: 1.4rem;

            color: #cbd5e1;
        }

        .task-box{

            max-width: 900px;

            background: rgba(255,255,255,0.04);

            backdrop-filter: blur(10px);

            border-radius: 30px;

            padding: 45px;
        }

        .task-box h2{

            font-size: 2.7rem;

            color: #60a5fa;

            margin-bottom: 35px;
        }

        .input-group{

            display: flex;

            flex-direction: column;

            margin-bottom: 30px;
        }

        .input-group label{

            margin-bottom: 12px;

            font-size: 1.1rem;

            color: #dbeafe;
        }

        .input-group input,
        .input-group textarea,
        .input-group select{

            background: rgba(255,255,255,0.06);

            border: none;

            border-radius: 16px;

            padding: 18px;

            outline: none;

            color: white;

            font-size: 1rem;
        }

        .input-group textarea{

            min-height: 170px;

            resize: vertical;
        }

        .input-group select{
            cursor: pointer;
        }

        .input-group option{
            background: #0f172a;
        }

        .create-btn{

            width: 100%;

            padding: 20px;

            border: none;

            border-radius: 16px;

            background: #2563eb;

            color: white;

            font-size: 1.1rem;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .create-btn:hover{

            transform: scale(1.02);

            background: #3b82f6;
        }

    </style>

</head>
<body>

    <div class="top">

        <h1>
            Adicionar à minhas tarefas 📋
        </h1>

        <p>
            adicione suas tarefas.
        </p>

    </div>

    <div class="task-box">

        <h2>
            Nova Tarefa 
        </h2>

        <form method="POST">

            {% csrf_token %}


            <div class="input-group">

                <label>
                    Título da tarefa
                </label>

                <input 
                    type="text"
                    name="titulo"
                    placeholder="Ex: atividade online"
                    required
                >

            </div>

          

            <div class="input-group">

                <label>
                    O que deve ser entregue?
                </label>

                <textarea
                    name="descricao"
                    placeholder="Explique o que precisa ser feito..."
                    required
                ></textarea>

            </div>


            <div class="input-group">

                <label>
                    Prazo
                </label>

                <select name="prazo" required>

                    <option value="">
                        Escolha o prazo
                    </option>

                    <option value="1">1 dia</option>
                    <option value="2">2 dias</option>
                    <option value="3">3 dias</option>
                    <option value="4">4 dias</option>
                    <option value="5">5 dias</option>
                    <option value="6">6 dias</option>
                    <option value="7">7 dias</option>

                </select>

            </div>

            <button type="submit" class="create-btn">
                Criar tarefa
            </button>

        </form>

    </div>

</body>
</html>
