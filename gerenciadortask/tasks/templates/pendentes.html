<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Pendentes</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            background: linear-gradient(to bottom right, #050816, #0f172a);

            min-height: 100vh;

            color: white;

            padding: 60px;
        }

        h1{

            font-size: 4rem;

            color: #60a5fa;

            margin-bottom: 50px;
        }

        .tasks{

            display: flex;

            flex-direction: column;

            gap: 25px;
        }

        .task{

            background: rgba(255,255,255,0.05);

            padding: 35px;

            border-radius: 25px;
        }

        .task h2{

            color: #93c5fd;

            font-size: 2rem;

            margin-bottom: 20px;
        }

        .task p{

            color: #dbeafe;

            font-size: 1.1rem;

            line-height: 1.7;

            margin-bottom: 15px;
        }

        .prazo{

            display: inline-block;

            background: #2563eb;

            padding: 10px 18px;

            border-radius: 12px;

            font-size: 0.95rem;
        }

        .buttons{

            margin-top: 25px;

            display: flex;

            gap: 15px;
        }

        .btn{

            border: none;

            padding: 14px 22px;

            border-radius: 12px;

            color: white;

            cursor: pointer;

            font-size: 1rem;

            transition: 0.3s;
        }

        .btn:hover{

            transform: scale(1.03);
        }

        .concluir{

            background: #16a34a;
        }

        .concluir:hover{

            background: #22c55e;
        }

        .excluir{

            background: #dc2626;
        }

        .excluir:hover{

            background: #ef4444;
        }

        .empty{

            color: #cbd5e1;

            font-size: 1.3rem;
        }

    </style>

</head>
<body>

    <h1>
        Tarefas Pendentes ⏳
    </h1>

    <div class="tasks">

        {% for tarefa in tarefas %}

            <div class="task">

                <h2>
                    {{ tarefa.titulo }}
                </h2>

                <p>
                    {{ tarefa.descricao }}
                </p>

                <span class="prazo">
                    Prazo: {{ tarefa.prazo }} dia(s)
                </span>

                <form method="POST" class="buttons">

                    {% csrf_token %}

                    <!-- CONCLUIR -->
                    <button
                        type="submit"
                        name="concluir"
                        value="{{ tarefa.id }}"
                        class="btn concluir"
                    >
                        Concluído
                    </button>

                    <!-- EXCLUIR -->
                    <button
                        type="submit"
                        name="excluir"
                        value="{{ tarefa.id }}"
                        class="btn excluir"
                    >
                        Excluir
                    </button>

                </form>

            </div>

        {% empty %}

            <p class="empty">
                Você não possui tarefas pendentes.
            </p>

        {% endfor %}

    </div>

</body>
</html>
