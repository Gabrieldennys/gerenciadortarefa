<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Realizadas</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            background: linear-gradient(to bottom right, #050816, #0f172a);

            min-height: 100vh;

            color: white;

            padding: 60px;
        }

        h1{

            font-size: 4rem;

            color: #60a5fa;

            margin-bottom: 50px;
        }

        .tasks{

            display: flex;

            flex-direction: column;

            gap: 25px;
        }

        .task{

            background: rgba(255,255,255,0.05);

            padding: 35px;

            border-radius: 25px;

            opacity: 0.9;
        }

        .task h2{

            color: #4ade80;

            font-size: 2rem;

            margin-bottom: 20px;
        }

        .task p{

            color: #dbeafe;

            font-size: 1.1rem;

            line-height: 1.7;

            margin-bottom: 15px;
        }

        .prazo{

            display: inline-block;

            background: #16a34a;

            padding: 10px 18px;

            border-radius: 12px;

            font-size: 0.95rem;
        }

        .data{

            margin-top: 20px;

            color: #93c5fd;

            font-size: 1rem;
        }

        .empty{

            color: #cbd5e1;

            font-size: 1.3rem;
        }

    </style>

</head>
<body>

    <h1>
        Tarefas Realizadas ✅
    </h1>

    <div class="tasks">

        {% for tarefa in tarefas %}

            <div class="task">

                <h2>
                    {{ tarefa.titulo }}
                </h2>

                <p>
                    {{ tarefa.descricao }}
                </p>

                <span class="prazo">
                    Concluída
                </span>

                <p class="data">
                    Data de conclusão:
                    {{ tarefa.concluida_em|date:"d/m/Y H:i" }}
                </p>

            </div>

        {% empty %}

            <p class="empty">
                Você ainda não concluiu nenhuma tarefa.
            </p>

        {% endfor %}

    </div>

</body>
</html>
